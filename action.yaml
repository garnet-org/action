name: "Garnet Runtime Visibility"
description: "Runtime profiling and behavioral assertions for GitHub Actions"
branding:
  icon: "activity"
  color: "purple"
inputs:
  api_token:
    description: "Your Garnet API token from app.garnet.ai"
    required: true
  github_token:
    description: "GitHub token used for pull request comments"
    required: false
    default: ${{ github.token }}
  api_url:
    description: "Garnet API URL"
    required: false
    default: "https://api.garnet.ai"
  garnetctl_version:
    description: "Garnet CLI version (1.2.3, or 'latest')"
    required: false
    default: "latest"
  jibril_version:
    description: "Jibril version (v2.10.8, v0.0, or 'latest')"
    required: false
    default: ""
  debug:
    description: "Enable debug mode"
    required: false
    default: "false"
  expected_jobs:
    description: "Number of jobs expected in the run, used for the 'k of n jobs recorded' line in the PR comment (defaults to the number of recorded jobs)"
    required: false
    default: ""
  permalink_url:
    description: "Explicit Run Profile link for the PR comment footer (defaults to a link derived from the run id)"
    required: false
    default: ""
outputs:
  profile_result:
    description: "Assertion result for this run: pass or fail"
  report_url:
    description: "Link to the full run report on app.garnet.ai"
  agent_id:
    description: "Identifier for the Jibril sensor instance that ran"
runs:
  using: "node24"
  main: "dist/main/index.js"
  post: "dist/post/index.js"
  post-if: "always()"
