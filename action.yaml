name: "Garnet Runtime Review"
author: "Garnet Labs Inc."
description: "Runtime review for GitHub Actions: eBPF records what your CI/CD actually did, then asserts on it in your PR"
branding:
  icon: "activity"
  color: "purple"
inputs:
  api_token:
    description: "Your Garnet API token from app.garnet.ai"
    required: true
  github_token:
    description: "GitHub token used for pull request comments"
    required: false
    default: ${{ github.token }}
  api_url:
    description: "Garnet API URL"
    required: false
    default: "https://api.garnet.ai"
  garnetctl_version:
    description: "Garnet CLI version (1.2.3, or 'latest')"
    required: false
    default: "latest"
  jibril_version:
    description: "Jibril version (v2.10.8, v0.0, or 'latest')"
    required: false
    default: ""
  debug:
    description: "Enable debug mode"
    required: false
    default: "false"
outputs:
  profile_result:
    description: "Assertion result for this run: pass or fail"
  report_url:
    description: "Link to the full run report on app.garnet.ai"
  agent_id:
    description: "Identifier for the Jibril sensor instance that ran"
runs:
  using: "node24"
  main: "dist/main/index.js"
  post: "dist/post/index.js"
  post-if: "always()"
