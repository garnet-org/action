name: PR Comment Smoke Test A and B

on:
    workflow_dispatch:
        inputs:
            api_url:
                description: "Garnet API URL"
                required: false
                default: "https://dev-api.garnet.ai"
            jibril_version:
                description: "Jibril version (e.g. v0.0, v2.10.8, latest)"
                required: false
                default: "v0.0"
            api_token:
                description: "Garnet API token (optional; defaults to repo secret)"
                required: false
                default: ""
            debug:
                description: "Enable debug mode"
                required: false
                default: "true"
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize
            - labeled
            - unlabeled

permissions:
    contents: read
    pull-requests: write

jobs:
    smoke-a:
        name: Smoke A
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event.pull_request.user.login == 'dependabot[bot]' ||
            contains(github.event.pull_request.labels.*.name, 'run-smoke-tests')
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Enable internal skip-comment mode
              if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'skip-github-app-comment')
              shell: bash
              run: echo "GARNET_ACTION_SKIP_GITHUB_APP_COMMENT=true" >> "$GITHUB_ENV"

            - name: Check API token availability
              id: api-token
              shell: bash
              run: |
                  if [ -n "${{ inputs.api_token || secrets.GARNET_API_TOKEN_DEV }}" ]; then
                    echo "available=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "::notice::Skipping smoke execution because no API token is available for this event."
                    echo "available=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Run Garnet
              if: steps.api-token.outputs.available == 'true'
              uses: ./
              with:
                  api_url: ${{ inputs.api_url || 'https://dev-api.garnet.ai' }}
                  debug: ${{ inputs.debug || 'true' }}
                  api_token: ${{ inputs.api_token || secrets.GARNET_API_TOKEN_DEV }}
                  jibril_version: ${{ inputs.jibril_version || 'v0.0' }}

            - name: Attempt egress to known IPs
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: |
                  set +e
                  for ip in 203.0.113.1 203.0.113.2 198.51.100.5 198.51.100.10 198.51.100.11 172.86.88.188; do
                    echo "Testing IP: ${ip}"
                    curl --max-time 10 "http://${ip}" >/dev/null 2>&1 || true
                  done

            - name: Curl to xvideos.com
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://xvideos.com || true

            - name: Curl to chainstack.com
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://chainstack.com || true

            - name: Curl to browsermine.com
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://browsermine.com || true

            - name: Curl to webhook.site
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://webhook.site || true

            - name: Curl to example.org
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://example.org || true

            - name: Curl to pastebin.com
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://pastebin.com || true

            - name: Create a file
              if: steps.api-token.outputs.available == 'true'
              run: touch testfile-smoke-a.txt

            - name: Execute zip command
              if: steps.api-token.outputs.available == 'true'
              run: zip testfile-smoke-a.zip testfile-smoke-a.txt

    smoke-b:
        name: Smoke B
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event.pull_request.user.login == 'dependabot[bot]' ||
            contains(github.event.pull_request.labels.*.name, 'run-smoke-tests')
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Enable internal skip-comment mode
              if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'skip-github-app-comment')
              shell: bash
              run: echo "GARNET_ACTION_SKIP_GITHUB_APP_COMMENT=true" >> "$GITHUB_ENV"

            - name: Check API token availability
              id: api-token
              shell: bash
              run: |
                  if [ -n "${{ inputs.api_token || secrets.GARNET_API_TOKEN_DEV }}" ]; then
                    echo "available=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "::notice::Skipping smoke execution because no API token is available for this event."
                    echo "available=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Run Garnet
              if: steps.api-token.outputs.available == 'true'
              uses: ./
              with:
                  api_url: ${{ inputs.api_url || 'https://dev-api.garnet.ai' }}
                  debug: ${{ inputs.debug || 'true' }}
                  api_token: ${{ inputs.api_token || secrets.GARNET_API_TOKEN_DEV }}
                  jibril_version: ${{ inputs.jibril_version || 'v0.0' }}

            - name: Attempt egress to known IPs
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: |
                  set +e
                  for ip in 203.0.113.1 203.0.113.2 198.51.100.5 198.51.100.10 198.51.100.11 172.86.88.188; do
                    echo "Testing IP: ${ip}"
                    curl --max-time 10 "http://${ip}" >/dev/null 2>&1 || true
                  done

            - name: Curl to xvideos.com
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://xvideos.com || true

            - name: Curl to chainstack.com
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://chainstack.com || true

            - name: Curl to browsermine.com
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://browsermine.com || true

            - name: Curl to webhook.site
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://webhook.site || true

            - name: Curl to example.org
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://example.org || true

            - name: Curl to pastebin.com
              if: steps.api-token.outputs.available == 'true'
              shell: bash
              run: curl --max-time 10 https://pastebin.com || true

            - name: Create a file
              if: steps.api-token.outputs.available == 'true'
              run: touch testfile-smoke-b.txt

            - name: Execute zip command
              if: steps.api-token.outputs.available == 'true'
              run: zip testfile-smoke-b.zip testfile-smoke-b.txt
