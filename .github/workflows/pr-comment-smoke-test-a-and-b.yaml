name: PR Comment Smoke Test A and B

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke-a:
    name: Smoke A
    uses: ./.github/workflows/pr-comment-smoke-test-reusable.yaml
    with:
      job_name: Smoke A
    secrets: inherit

  smoke-b:
    name: Smoke B
    uses: ./.github/workflows/pr-comment-smoke-test-reusable.yaml
    with:
      job_name: Smoke B
    secrets: inherit
